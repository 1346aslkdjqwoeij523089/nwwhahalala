services:
  - type: web
    name: nww-discord-bot
    env: node
    plan: free
    runtime: node
    region: oregon
    branch: main
    # Discord bots need a lightweight HTTP endpoint so Render/UptimeRobot can check health.
    healthCheckPath: /healthz
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false





